<!DOCTYPE html>
<html>
<head>
    <title>Sugar & Spice Bakery</title>
    <style>
        body { 
            background-color: #fff5f8; /* Pinkish Background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px; text-align: center;
        }
        .container { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 30px;
        }
        .card { 
            background: white; border-radius: 20px; width: 260px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); overflow: hidden;
            border: 2px solid #ffdae9; transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 20px; }
        .price { color: #d63384; font-weight: bold; font-size: 1.3em; }
        .btn { background: #d63384; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🍰 Sugar & Spice Bakery 🧁</h1>
    
    <div class="container">
        {% if items %}
            {% for item in items %}
            <div class="card">
                <img src="{{ item.img }}" alt="Bakery Item">
                <div class="info">
                    <h3>{{ item.name }}</h3>
                    <p class="price">Rs. {{ item.price }}</p>
                    <button class="btn">Add to Cart 🛒</button>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p>Oops! Koi products nahi miley. app.py check karein!</p>
        {% endif %}
    </div>
</body>
</html>
